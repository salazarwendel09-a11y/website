<!DOCTYPE html>
<html>
<head>
<style>
p {outline-color:red;}
p.dotted {outline-style: dotted;}
p.dashed {outline-style: dashed;}
p.solid {outline-style: solid;}
p.double {outline-style: double;}
p.groove {outline-style: groove;}
p.ridge {outline-style: ridge;}
p.inset {outline-style: inset;}
p.outset {outline-style: outset;}
</style>
</head>
<body>
<h2>The outline-style Property</h2>
<p class="dotted">SALAZAR WENDELL MAPAGMAHAL</p>
<p class="dashed">SALAZAR WENDELL MAPAGMAHAL</p>
<p class="solid">SALAZAR WENDELL MAPAGMAHAL</p>
<p class="double">SALAZAR WENDELL MAPAGMAHAL</p>
<p class="groove">SALAZAR WENDELL MAPAGMAHAL</p>
<p class="ridge">SALAZAR WENDELL MAPAGMAHAL</p>
<p class="inset">SALAZAR WENDELL MAPAGMAHAL</p>
<p class="outset">SALAZAR WENDELL MAPAGMAHAL</p>
</body>
</html>
